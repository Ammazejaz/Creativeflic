    <style>
      body { font-family: 'Space Grotesk', sans-serif; }
      .clip-path-full { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); }
      .perspective-1000 { perspective: 1000px; }
      .rotate-x-2 { transform: rotateX(2deg); }
      .animate-marquee { animation: marquee 35s linear infinite; }
      @keyframes marquee {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      @keyframes pulse-slow {
        0%, 100% { opacity: 0.8; }
        50% { opacity: 1; }
      }
      .animate-pulse-slow {
        animation: pulse-slow 3s ease-in-out infinite;
      }
      @keyframes float-slow {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-20px) rotate(2deg); }
      }
      .animate-float-slow { animation: float-slow 6s ease-in-out infinite; }
      
      @keyframes float-medium {
        0%, 100% { transform: translateY(0px) rotate(12deg); }
        50% { transform: translateY(-15px) rotate(8deg); }
      }
      .animate-float-medium { animation: float-medium 5s ease-in-out infinite; }

      @keyframes music-bar {
          0%, 100% { height: 20%; }
          50% { height: 100%; }
      }
      .animate-music-bar { animation: music-bar 1s ease-in-out infinite; }
      
      /* Glow effect styles */
      .glow-white {
          box-shadow: 0 0 10px rgba(255, 255, 255, 0.2), 0 0 20px rgba(255, 255, 255, 0.1);
          transition: box-shadow 0.3s ease-in-out;
      }
      .hover\:glow-white:hover {
          box-shadow: 0 0 15px rgba(255, 255, 255, 0.4), 0 0 30px rgba(255, 255, 255, 0.2);
      }
      .glow-blue {
          box-shadow: 0 0 10px rgba(0, 150, 255, 0.3), 0 0 20px rgba(0, 150, 255, 0.15);
          transition: box-shadow 0.3s ease-in-out;
      }
      .hover\:glow-blue:hover {
          box-shadow: 0 0 15px rgba(0, 150, 255, 0.5), 0 0 30px rgba(0, 150, 255, 0.3);
      }
      .glow-yellow {
          box-shadow: 0 0 10px rgba(250, 204, 21, 0.4), 0 0 20px rgba(250, 204, 21, 0.2);
          transition: box-shadow 0.3s ease-in-out;
      }


      /* Media + work-demo loops */
      .kenburns { animation: kenburns 28s ease-in-out infinite; }
      @keyframes kenburns { 0%,100% { transform: scale(1) translate(0,0); } 50% { transform: scale(1.07) translate(1%,-1%); } }
      .breathe { animation: breathe 7s ease-in-out infinite; }
      @keyframes breathe { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
      .animate-spin-slower { animation: spin 40s linear infinite; }
      .playhead { animation: playhead 9s linear infinite; }
      @keyframes playhead { 0% { left: 2%; } 100% { left: 98%; } }
      .animate-marquee-slow { animation: marquee 75s linear infinite; }
      .marquee-container:hover .animate-marquee-slow { animation-play-state: paused; }
      
      /* Word mask reveal */
      .wr-mask { display:inline-block; overflow:hidden; vertical-align:bottom; padding-bottom:0.12em; margin-bottom:-0.12em; }
      .wr-word { display:inline-block; transform:translateY(115%) rotate(2deg); opacity:0; transition:transform 1s cubic-bezier(0.22,1,0.36,1), opacity 0.7s ease; will-change:transform; }
      .wr-visible .wr-word { transform:translateY(0) rotate(0deg); opacity:1; }
      /* Gradient shimmer for highlighted words */
      .text-shimmer { background-size:200% auto !important; animation:shimmer 9s linear infinite; }
      @keyframes shimmer { to { background-position:200% center; } }
      /* Button sheen sweep */
      .btn-sheen { position:relative; overflow:hidden; }
      .btn-sheen::after { content:''; position:absolute; top:0; left:-160%; width:60%; height:100%; background:linear-gradient(105deg, transparent, rgba(255,255,255,0.35), transparent); transform:skewX(-20deg); transition:left 0.9s cubic-bezier(0.22,1,0.36,1); pointer-events:none; }
      .btn-sheen:hover::after { left:160%; }
      /* Traveling spark on the milestone curve */
      .curve-dot { animation:curve-travel 10s cubic-bezier(0.45,0,0.55,1) infinite; }
      @keyframes curve-travel { 0% { left:2%; opacity:0; } 8% { opacity:1; } 90% { opacity:1; } 100% { left:97%; opacity:0; } }
      @media (prefers-reduced-motion: reduce) {
        .wr-word { transition:none; transform:none; opacity:1; }
        .text-shimmer, .curve-dot, .animate-marquee, .kenburns, .breathe, .playhead, .animate-spin-slower, .animate-marquee-slow { animation:none; }
      }
      /* Spotlight Effect CSS */
      .spotlight-card {
        position: relative;
        overflow: hidden;
        isolation: isolate;
      }
      .spotlight-card::before {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle 600px at var(--mouse-x, 50%) var(--mouse-y, 50%),
          rgba(59, 130, 246, 0.15),
          transparent 80%
        );
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
        z-index: 1;
      }
      .spotlight-card:hover::before {
        opacity: 1;
      }
      
      @keyframes spin-slow-reverse {
          from { transform: rotate(360deg); }
          to { transform: rotate(0deg); }
      }
      .animate-spin-slow-reverse {
          animation: spin-slow-reverse 6s linear infinite;
      }
      .animate-spin-slow {
          animation: spin 3s linear infinite;
      }
      @keyframes spin {
          from { transform: rotate(0deg); }
          to { transform: rotate(360deg); }
      }
